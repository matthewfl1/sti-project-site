<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>СТРОЙТЕХИНВЕСТ | ERP</title>
    <style>
        :root { --blue: #004a99; --bg: #f4f7fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--blue); color: white; padding: 15px 5%; font-weight: 800; font-size: 22px; }
        .main { display: grid; grid-template-columns: 220px 1fr 380px; gap: 20px; padding: 20px 5%; }
        
        .card { background: white; border-radius: 8px; padding: 15px; border: 1px solid #e1e8ed; transition: 0.3s; }
        .card:hover { border-color: var(--blue); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }
        
        .btn-select { background: var(--blue); color: white; border: none; width: 100%; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        
        .sidebar-box { background: white; padding: 15px; border-radius: 8px; position: sticky; top: 20px; }
        .cart-item { font-size: 12px; padding: 5px 0; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; }
        .total-price { font-size: 24px; color: var(--blue); font-weight: 900; margin-top: 15px; }
        
        iframe { width: 100%; height: 520px; border: none; border-radius: 12px; }
    </style>
</head>
<body>

<header>СТРОЙТЕХИНВЕСТ</header>

<div class="main">
    <nav>
        <div class="sidebar-box">
            <b style="color:var(--blue)">КАТАЛОГ</b><br><br>
            <a href="#" style="text-decoration:none; color:#333; display:block; margin-bottom:10px;">Сетки сварные</a>
            <a href="#" style="text-decoration:none; color:#333; display:block; margin-bottom:10px;">Проволока ВР-1</a>
            <a href="#" style="text-decoration:none; color:#333; display:block;">Крепеж ГБТ</a>
        </div>
    </nav>

    <section>
        <div class="grid">
            <div class="card">
                <h4>Сетка сварная 50х50х3</h4>
                <p style="font-size:12px; color:#666">ГОСТ 23279</p>
                <button class="btn-select" onclick="selectToCalc('Сетка сварная 50х50х3')">ВЫБРАТЬ</button>
            </div>
            <div class="card">
                <h4>Болт высокопрочный M24x120</h4>
                <p style="font-size:12px; color:#666">ГОСТ 22353</p>
                <button class="btn-select" onclick="selectToCalc('Болт высокопрочный M24x120')">ВЫБРАТЬ</button>
            </div>
        </div>
    </section>

    <aside>
        <iframe id="calcFrame" src="calc.html"></iframe>
        
        <div class="sidebar-box" style="margin-top:20px;">
            <b style="color:var(--blue)">СПЕЦИФИКАЦИЯ ЗАКАЗА</b>
            <div id="cartList" style="margin-top:15px; color:#555;"><i>Пусто</i></div>
            <div class="total-price"><span id="finalSum">0</span> ₽</div>
            <p style="font-size:10px; color:#999; margin-top:10px;">* Стоимость является ориентировочной</p>
        </div>
    </aside>
</div>

<script>
    let totalSum = 0;

    function selectToCalc(name) {
        document.getElementById('calcFrame').contentWindow.postMessage({ type: 'setProduct', name: name }, '*');
    }

    window.addEventListener('message', function(e) {
        if(e.data.type === 'addToCart') {
            const list = document.getElementById('cartList');
            if(totalSum === 0) list.innerHTML = '';
            
            list.innerHTML += `<div class="cart-item"><span>${e.data.name}</span><b>${e.data.price.toLocaleString()} ₽</b></div>`;
            totalSum += e.data.price;
            document.getElementById('finalSum').innerText = totalSum.toLocaleString();
        }
    });
</script>
</body>
</html>
